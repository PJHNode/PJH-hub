<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forum — PJH Hub</title>
  <style>
    :root {
      --page: #f5f5f5; --bar: #111; --ink: #111; --muted: #666;
      --line: #d0d0d0; --field: #fff; --soft: #efefef;
      font-family: "SF Mono","Fira Mono","Consolas","Menlo",monospace;
    }
    [data-theme="dark"] {
      --page: #0d0d0d; --bar: #0a0a0a; --ink: #e0e0e0; --muted: #777;
      --line: #2a2a2a; --field: #181818; --soft: #141414;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--page); color: var(--ink); font-size: 13px; }
    [data-theme="dark"] body { background: #080808; }

    .shell { max-width: 800px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; border-left: 1px solid var(--line); border-right: 1px solid var(--line); }

    .topbar { background: var(--bar); padding: 7px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #000; gap: 8px; flex-wrap: wrap; }
    .brand-row { display: flex; align-items: center; gap: 8px; }
    .mark { width: 20px; height: 20px; border: 1px solid #fff; color: #fff; font-weight: 700; font-size: 12px; display: grid; place-items: center; }
    .topbar h1 { font-size: 13px; color: #fff; letter-spacing: 0.05em; font-weight: 700; }
    .eyebrow { font-size: 9px; color: #888; letter-spacing: 0.04em; }
    .topbar-controls { display: flex; align-items: center; gap: 6px; }
    .topbar-btn { background: transparent; border: 1px solid #444; color: #888; font-size: 9px; letter-spacing: 0.08em; padding: 2px 6px; cursor: pointer; font-family: inherit; text-decoration: none; display: inline-flex; align-items: center; }
    .topbar-btn:hover { background: #fff; color: #000; border-color: #fff; }
    [data-theme="dark"] .topbar-btn:hover { background: #ddd; color: #000; border-color: #ddd; }
    .user-badge { font-size: 10px; color: #bbb; padding: 2px 6px; border: 1px solid #444; }

    /* ── 카테고리 탭 ── */
    .category-tabs { display: flex; border-bottom: 2px solid #000; background: var(--soft); }
    .cat-tab {
      flex: 1; padding: 10px 12px; background: transparent; border: none; border-right: 1px solid var(--line);
      color: var(--muted); cursor: pointer; font: inherit; font-size: 12px; text-align: left;
    }
    .cat-tab:last-child { border-right: none; }
    .cat-tab strong { display: block; font-size: 12.5px; color: var(--ink); margin-bottom: 2px; }
    .cat-tab span { font-size: 10px; color: var(--muted); }
    .cat-tab.active { background: var(--field); border-bottom: 2px solid var(--ink); margin-bottom: -2px; }
    .cat-tab:hover:not(.active) { background: var(--field); }

    /* ── 로그인 필요 안내 ── */
    .login-notice { padding: 14px 12px; border-bottom: 1px solid var(--line); background: var(--soft); font-size: 11.5px; color: var(--muted); line-height: 1.6; }
    .login-notice a { color: var(--ink); text-decoration: underline; }

    /* ── 작성 폼 ── */
    .write-box { padding: 12px; border-bottom: 1px solid var(--line); background: var(--soft); display: flex; flex-direction: column; gap: 6px; }
    .write-box input[type="text"], .write-box textarea {
      width: 100%; padding: 7px; border: 1px solid var(--line); border-radius: 0;
      background: var(--field); color: var(--ink); font: inherit; font-size: 12px; resize: vertical;
    }
    .write-box input[type="text"]:focus, .write-box textarea:focus { outline: none; border-color: var(--ink); }
    .write-box textarea { min-height: 64px; }
    .char-count { font-size: 10px; color: var(--muted); text-align: right; }
    .btn-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .write-as { font-size: 10px; color: var(--muted); }
    button { border: 1px solid #999; background: #e8e8e8; color: #111; padding: 4px 14px; font: inherit; font-size: 12px; cursor: pointer; border-radius: 0; }
    button:hover { background: #fff; border-color: #444; }
    button.primary { background: #111; color: #fff; border-color: #000; font-weight: 700; }
    button.primary:hover { background: #333; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    [data-theme="dark"] button { background: #1a1a1a; border-color: #444; color: #ccc; }
    [data-theme="dark"] button:hover { background: #2a2a2a; }
    [data-theme="dark"] button.primary { background: #ddd; color: #000; border-color: #ddd; }

    /* ── 게시글 목록 ── */
    .post-list { flex: 1; display: flex; flex-direction: column; }
    .post-item { padding: 12px; border-bottom: 1px solid var(--line); display: flex; flex-direction: column; gap: 5px; background: var(--page); }
    .post-item:hover { background: var(--soft); }
    .post-title-row { display: flex; align-items: center; gap: 6px; }
    .post-title { font-size: 13px; font-weight: 700; color: var(--ink); }
    .answered-badge { font-size: 9px; letter-spacing: 0.04em; background: var(--ink); color: var(--page); padding: 1px 6px; flex-shrink: 0; }
    .post-meta { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .post-nick { font-weight: 700; font-size: 11px; color: var(--ink); }
    .post-date { font-size: 10px; color: var(--muted); }
    .post-content { font-size: 12.5px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .post-actions { display: flex; gap: 6px; align-items: center; }
    .post-del, .post-answer { background: transparent; border: 1px solid var(--line); color: var(--muted); font-size: 10px; padding: 1px 6px; }
    .post-del:hover { border-color: #888; color: var(--ink); background: transparent; }
    .post-answer:hover { border-color: #888; color: var(--ink); background: transparent; }
    .post-answer.is-answered { border-color: var(--ink); color: var(--ink); }

    .empty-state { padding: 40px; text-align: center; color: var(--muted); font-size: 12px; line-height: 2; }
    .footer { border-top: 1px solid var(--line); padding: 6px 12px; font-size: 9px; color: var(--muted); letter-spacing: 0.05em; text-align: center; background: var(--soft); }
  </style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand-row">
      <span class="mark">F</span>
      <div>
        <h1>Forum</h1>
        <p class="eyebrow">PJH Hub account required</p>
      </div>
    </div>
    <div class="topbar-controls">
      <span class="user-badge" id="userBadge" style="display:none;"></span>
      <button class="topbar-btn" id="themeToggle">[ DARK ]</button>
      <a class="topbar-btn" href="../">[ HUB ]</a>
    </div>
  </header>

  <!-- 카테고리 탭 -->
  <nav class="category-tabs">
    <button class="cat-tab active" data-category="free">
      <strong>자유게시판</strong>
      <span>잡담, 정보 교류 등 종합 커뮤니티 공간</span>
    </button>
    <button class="cat-tab" data-category="qna">
      <strong>주제별 Q&amp;A</strong>
      <span>궁금한 점 질문 및 답변 채택</span>
    </button>
  </nav>

  <!-- 비로그인 안내 -->
  <div class="login-notice" id="loginNotice" style="display:none;">
    <strong>Forum은 PJH Hub 계정이 필요합니다.</strong><br />
    <a href="../">PJH Hub로 이동해서 로그인 / 가입</a>한 뒤 이 페이지로 돌아오세요. 글 읽기는 로그인 없이도 가능합니다.
  </div>

  <!-- 작성 폼 (로그인 시에만 표시) -->
  <div class="write-box" id="writeBox" style="display:none;">
    <input type="text" id="titleInput" maxlength="100" placeholder="질문 제목" style="display:none;" />
    <textarea id="content" maxlength="1000" placeholder="무슨 생각이든 자유롭게 남겨보세요."></textarea>
    <div class="btn-row">
      <span class="write-as" id="writeAs"></span>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="char-count" id="charCount">0 / 1000</span>
        <button class="primary" id="submitBtn">등록</button>
      </div>
    </div>
  </div>

  <!-- 글 목록 -->
  <div class="post-list" id="postList">
    <div class="empty-state">불러오는 중...</div>
  </div>

  <footer class="footer">© 2026 PJH HUB · Anonymous &amp; Zero-Knowledge Tools</footer>
</div>

<script src="../auth-widget.js"></script>
<script>
  const API = "https://forum.chaostatix.workers.dev";
  var currentCategory = "free";

  // ── 테마 ──
  function initTheme() {
    var saved = localStorage.getItem("pjh-theme");
    if (saved === "dark") document.documentElement.setAttribute("data-theme", "dark");
    updateThemeBtn();
  }
  function toggleTheme() {
    var isDark = document.documentElement.getAttribute("data-theme") === "dark";
    if (isDark) { document.documentElement.removeAttribute("data-theme"); localStorage.setItem("pjh-theme","light"); }
    else { document.documentElement.setAttribute("data-theme","dark"); localStorage.setItem("pjh-theme","dark"); }
    updateThemeBtn();
  }
  function updateThemeBtn() {
    var btn = document.getElementById("themeToggle");
    btn.textContent = document.documentElement.getAttribute("data-theme") === "dark" ? "[ LIGHT ]" : "[ DARK ]";
  }
  document.getElementById("themeToggle").addEventListener("click", toggleTheme);

  // ── 카테고리 탭 전환 ──
  document.querySelectorAll(".cat-tab").forEach(function(tab) {
    tab.addEventListener("click", function() {
      document.querySelectorAll(".cat-tab").forEach(function(t) { t.classList.remove("active"); });
      tab.classList.add("active");
      currentCategory = tab.dataset.category;

      var titleInput = document.getElementById("titleInput");
      var content = document.getElementById("content");
      if (currentCategory === "qna") {
        titleInput.style.display = "";
        content.placeholder = "질문 내용을 자세히 적어주세요.";
      } else {
        titleInput.style.display = "none";
        content.placeholder = "무슨 생각이든 자유롭게 남겨보세요.";
      }
      loadPosts();
    });
  });

  // ── 로그인 상태에 따라 작성 UI 토글 ──
  function refreshAuthUI() {
    var session = window.PJHAuth ? window.PJHAuth.getSession() : null;
    var loginNotice = document.getElementById("loginNotice");
    var writeBox = document.getElementById("writeBox");
    var userBadge = document.getElementById("userBadge");
    var writeAs = document.getElementById("writeAs");

    if (session) {
      loginNotice.style.display = "none";
      writeBox.style.display = "flex";
      userBadge.style.display = "inline-flex";
      userBadge.textContent = session.realName + " (" + session.userId + ")";
      writeAs.textContent = session.realName + " 님으로 작성";
    } else {
      loginNotice.style.display = "block";
      writeBox.style.display = "none";
      userBadge.style.display = "none";
    }
  }

  document.getElementById("content").addEventListener("input", function() {
    document.getElementById("charCount").textContent = this.value.length + " / 1000";
  });

  function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function timeAgo(ts) {
    var diff = Date.now() - ts;
    var m = Math.floor(diff/60000), h = Math.floor(diff/3600000), d = Math.floor(diff/86400000);
    if (d > 0) return d + "일 전";
    if (h > 0) return h + "시간 전";
    if (m > 0) return m + "분 전";
    return "방금";
  }

  function currentUserId() {
    var session = window.PJHAuth ? window.PJHAuth.getSession() : null;
    return session ? session.userId : null;
  }

  async function loadPosts() {
    var list = document.getElementById("postList");
    list.innerHTML = '<div class="empty-state">불러오는 중...</div>';
    try {
      var res = await fetch(API + "/posts?category=" + currentCategory);
      if (!res.ok) {
        var errBody = await res.json().catch(function() { return {}; });
        throw new Error(errBody.error || ("HTTP " + res.status));
      }
      var posts = await res.json();
      if (!posts.length) {
        list.innerHTML = '<div class="empty-state">아직 글이 없습니다.<br>첫 번째 글을 남겨보세요.</div>';
        return;
      }
      var myId = currentUserId();
      list.innerHTML = posts.map(function(p) {
        var canManage = myId && myId === p.user_id;
        var titleBlock = "";
        if (p.category === "qna") {
          titleBlock = '<div class="post-title-row">' +
            '<span class="post-title">' + esc(p.title) + '</span>' +
            (p.is_answered ? '<span class="answered-badge">채택됨</span>' : '') +
            '</div>';
        }
        var actions = '<div class="post-actions">';
        if (canManage && p.category === "qna") {
          actions += '<button class="post-answer' + (p.is_answered ? ' is-answered' : '') + '" onclick="toggleAnswer(' + p.id + ')">' + (p.is_answered ? '채택 취소' : '답변 채택') + '</button>';
        }
        if (canManage) {
          actions += '<button class="post-del" onclick="deletePost(' + p.id + ')">삭제</button>';
        }
        actions += '</div>';

        return '<div class="post-item">' +
          titleBlock +
          '<div class="post-meta">' +
          '<span class="post-nick">' + esc(p.real_name) + '</span>' +
          '<div style="display:flex;align-items:center;gap:8px;">' +
          '<span class="post-date">' + timeAgo(p.created_at) + '</span>' +
          actions +
          '</div></div>' +
          '<div class="post-content">' + esc(p.content) + '</div>' +
          '</div>';
      }).join('');
    } catch(e) {
      list.innerHTML = '<div class="empty-state">글을 불러올 수 없습니다.<br>' + esc(e.message || "잠시 후 다시 시도해주세요.") + '</div>';
    }
  }

  document.getElementById("submitBtn").addEventListener("click", async function() {
    var session = window.PJHAuth ? window.PJHAuth.getSession() : null;
    if (!session) { alert("로그인이 필요합니다."); return; }

    var title = document.getElementById("titleInput").value.trim();
    var content = document.getElementById("content").value.trim();
    if (currentCategory === "qna" && !title) { alert("질문 제목을 입력하세요."); return; }
    if (!content) { alert("내용을 입력하세요."); return; }

    this.disabled = true;
    this.textContent = "등록 중…";
    try {
      var res = await fetch(API + "/posts", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + session.token },
        body: JSON.stringify({ category: currentCategory, title: title, content: content }),
      });
      var data = await res.json().catch(function() { return {}; });
      if (res.ok) {
        document.getElementById("content").value = "";
        document.getElementById("titleInput").value = "";
        document.getElementById("charCount").textContent = "0 / 1000";
        await loadPosts();
      } else {
        alert(data.error || "오류가 발생했습니다.");
      }
    } catch(e) { alert("서버 연결 실패: " + e.message); }
    this.disabled = false;
    this.textContent = "등록";
  });

  async function toggleAnswer(id) {
    var session = window.PJHAuth ? window.PJHAuth.getSession() : null;
    if (!session) return;
    try {
      var res = await fetch(API + "/posts/" + id, {
        method: "PATCH",
        headers: { "Authorization": "Bearer " + session.token },
      });
      if (res.ok) { await loadPosts(); }
      else { var err = await res.json(); alert(err.error || "처리 실패"); }
    } catch(e) { alert("서버 연결 실패: " + e.message); }
  }

  async function deletePost(id) {
    var session = window.PJHAuth ? window.PJHAuth.getSession() : null;
    if (!session) return;
    if (!confirm("이 글을 삭제할까요?")) return;
    try {
      var res = await fetch(API + "/posts/" + id, {
        method: "DELETE",
        headers: { "Authorization": "Bearer " + session.token },
      });
      if (res.ok) { await loadPosts(); }
      else { var err = await res.json(); alert(err.error || "삭제 실패"); }
    } catch(e) { alert("서버 연결 실패: " + e.message); }
  }

  // ── 초기화 ──
  initTheme();
  refreshAuthUI();
  loadPosts();
  setInterval(loadPosts, 30000);
  setInterval(refreshAuthUI, 2000);
</script>
</body>
</html>
